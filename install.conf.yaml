- defaults:
    link:
      create: true
      relink: true
      force: true

- clean: ["~"]

- link:
    ~/.gitconfig:
      path: .gitconfig
    ~/.aerospace.toml:
      path: .aerospace.toml
    ~/.config/:
      glob: true
      path: .config/*
    ~/.ansible.cfg:
      path: .ansible.cfg
    ~/.claude/CLAUDE.md:
      path: .claude/CLAUDE.md
    ~/.claude/settings.json:
      path: .claude/settings.json
    ~/.local/share/opencode/auth.json:
      path: .local/share/opencode/auth.json

- shell: []
