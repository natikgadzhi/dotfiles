# remap prefix from 'C-b' to Ctrl + Space
unbind C-b
set -g prefix C-Space
set -g prefix2 C-@
bind C-Space send-prefix
bind C-@ send-prefix

set -g mouse on
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g focus-events on
set -g set-clipboard on

# Send escape immediately
set -sg escape-time 0

# Set default shell to Fish. This won't work outside of brew environments.
set-option -g default-shell /opt/homebrew/bin/fish

set-option -s extended-keys always
set-option -as terminal-features 'xterm*:extkeys'
set-option -as terminal-features 'xterm*:hyperlinks'

# manage windows
# Set base window index to 1 so they start from 1, not 0.
bind c new-window -c "#{pane_current_path}"
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Auto-rename windows to show current directory basename
set-option -g allow-rename on
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{b:pane_current_path}#(~/.config/tmux/window-name.sh '#{pane_current_command}')"

# Set terminal title to "tmux: window-name"
set-option -g set-titles on
set-option -g set-titles-string "tmux: #W"

# set long history buffer
set-option -g history-limit 10000

# Navigate windows with Alt + [ and Alt + ]
bind -n M-[ previous-window
bind -n M-] next-window

# Jump to window by index with Opt + number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

set -g pane-border-style "fg=#3a4148"
set -g pane-active-border-style "fg=#ff6f00"

# split panes using v and h respectively
# defaults are % and somethin
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# reload config file on ctrl-a r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"


# Shift+hjkl = 6-cell increments (coarse)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Ctrl+Arrow = 1-cell increments (fine)
bind -r C-Left resize-pane -L 1
bind -r C-Down resize-pane -D 1
bind -r C-Up resize-pane -U 1
bind -r C-Right resize-pane -R 1

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# clear screen and scrollback history (Cmd+K in Ghostty sends prefix + C-l)
bind C-l send-keys C-l \; run-shell "sleep 0.1" \; clear-history

# Use vi key bindings in copy mode
set-window-option -g mode-keys vi

# Configure 'v' in copy mode to begin text selection, similar to Vim's visual mode
# This allows selecting text with 'v' and then defining the selection area with movement keys
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel pbcopy

# Enable OSC 52 clipboard integration for terminal clipboard support

# Update default binding of Enter to also use copy-pipe-and-cancel
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel pbcopy

# Mouse-based copy operations
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel pbcopy
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Double-click to select word and copy
bind-key -T root DoubleClick1Pane select-pane \; copy-mode \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel pbcopy

# Triple-click to select line and copy
bind-key -T root TripleClick1Pane select-pane \; copy-mode \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel pbcopy

bind -T copy-mode-vi WheelUpPane send -N3 -X scroll-up
bind -T copy-mode-vi WheelDownPane send -N3 -X scroll-down

# 
# STATUS LINE — Doom One theme (mirroring lualine section blocks)
# 
set -g status on
set -g status-position top
set -g status-interval 1
set -g status-style "bg=#282c34,fg=#bbc2cf"

# Left: [session] block in blue
set -g status-left "#[bg=#51afef,fg=#282c34,bold] #S #[bg=#282c34] "
set -g status-left-length 30

# Right: window list + time (windows on the right, matching nvim lualine layout)
set -g status-right-length 120

# Window list — active window gets blue bg block like lualine's active section
# Positioned on the right via status-justify
set -g status-justify right
setw -g window-status-format "#[bg=#282c34,fg=#5B6268] #I:#W "
setw -g window-status-current-format "#[bg=#51afef,fg=#282c34,bold] #I:#W #[bg=#282c34]"
setw -g window-status-separator ""

# After window list: [time] in blue block
set -g status-right "#[bg=#51afef,fg=#282c34,bold] %I:%M %p "

# Selection / copy mode
set -g mode-style "bg=#51afef,fg=#282c34"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
